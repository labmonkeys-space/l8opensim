# NOTE: The repo is currently labmonkeys-space/l8opensim. A separate OpenSpec
# change (detach-fork-rename-simwerk) renames the repo to `simwerk`. When that
# lands, update `site_name`, `site_url`, `repo_url`, `repo_name`, and `edit_uri`
# to reflect the new slug. Tracked as a follow-up in the rename change's tasks.

site_name: l8opensim
site_description: Layer 8 data center simulator — SNMP/SSH/HTTPS at 30,000-device scale
site_url: https://labmonkeys-space.github.io/l8opensim/
repo_url: https://github.com/labmonkeys-space/l8opensim
repo_name: labmonkeys-space/l8opensim
edit_uri: edit/main/docs/

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mermaid-zoom.js

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started/quick-start.md
      - Docker: getting-started/docker.md
  - Ops:
      - Scaling: ops/scaling.md
      - Network Namespace: ops/network-namespace.md
      - Flow Export: ops/flow-export.md
      - Troubleshooting: ops/troubleshooting.md
  - Reference:
      - Architecture: reference/architecture.md
      - CLI Flags: reference/cli-flags.md
      - Web API: reference/web-api.md
      - Device Types: reference/device-types.md
      - SNMP: reference/snmp.md
      - Flow Export: reference/flow-export.md
      - Resource Files: reference/resource-files.md
      - GPU Simulation:
          - Overview: reference/gpu/index.md
          - Protobuf Model: reference/gpu/proto-model.md
          - Pollaris & Parsing: reference/gpu/pollaris.md
          - DCGM Simulation: reference/gpu/dcgm.md
