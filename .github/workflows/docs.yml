name: Docs

# Publishes the Docusaurus site at
# https://labmonkeys-space.github.io/l8opensim/ on every push to main. Toolchain
# and Node version are pinned via package-lock.json and .nvmrc respectively.
#
# First-deploy manual step: after this workflow succeeds for the first time
# following the Docusaurus migration, a maintainer must confirm the GitHub
# Pages source is still set to the `gh-pages` branch in Settings -> Pages.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docusaurus.config.ts'
      - 'sidebars.ts'
      - 'src/**'
      - 'static/**'
      - 'package.json'
      - 'package-lock.json'
      - '.nvmrc'
      - '.github/workflows/docs.yml'
      - 'Makefile'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # deploy action needs history to push to gh-pages

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install docs toolchain
        run: make docs-install

      - name: Verify strict build
        run: make docs-build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e  # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: '41898282+github-actions[bot]@users.noreply.github.com'
